name: Build Executables

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller huggingface_hub

      - name: Download model weights
        run: |
          python -c "from huggingface_hub import hf_hub_download; import shutil; shutil.copy(hf_hub_download('OpenSistemas/YOLOv8-crack-seg', 'yolov8n/weights/best.pt'), 'crack_n.pt')"

      - name: Build frontend & executable
        run: python build.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CrackDetector-${{ runner.os }}
          path: dist/CrackDetector.zip
